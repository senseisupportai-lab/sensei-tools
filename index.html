<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>席替えツール</title>
<style>
  * { box-sizing: border-box; }
  body { font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif;
    margin:0; background:#f4f7f2; color:#2f3b2a; line-height:1.6; }
  .wrap { max-width:1000px; margin:0 auto; padding:20px 16px 60px; }
  h1 { font-size:24px; color:#3f6b27; margin:6px 0 2px; }
  .sub { color:#6c8a52; font-size:13px; margin-bottom:18px; }
  .panel { background:#fff; border:1.5px solid #dde7d0; border-radius:14px; padding:16px 18px; margin-bottom:16px; }
  .row { display:flex; gap:18px; flex-wrap:wrap; }
  .field { flex:1; min-width:240px; }
  label { display:block; font-weight:bold; color:#3f6b27; font-size:13px; margin-bottom:5px; }
  .hint { color:#8a9a7c; font-size:11px; font-weight:normal; }
  input[type=number]{ width:64px; padding:6px 8px; border:1.5px solid #cfe0bb; border-radius:8px; font-size:15px; }
  textarea { width:100%; border:1.5px solid #cfe0bb; border-radius:8px; padding:8px 10px; font-size:13px;
             font-family:inherit; resize:vertical; }

  .group { border:1px solid #e6edda; background:#fbfdf8; border-radius:10px; padding:8px 10px; margin-bottom:8px;
           display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .group .glabel { font-size:12px; color:#7a8a6b; font-weight:bold; }
  select.gsel { padding:6px 6px; border:1.5px solid #cfe0bb; border-radius:8px; font-size:13px; min-width:96px; background:#fff; }
  .rm { background:#fff; border:1.5px solid #e0b4b4; color:#c0392b; border-radius:8px; padding:4px 9px; font-size:12px; cursor:pointer; }
  .addbtn { background:#fff; border:1.5px dashed #9cc473; color:#5a8a3c; border-radius:8px; padding:7px 14px; font-size:13px; cursor:pointer; }

  .chips { display:flex; flex-wrap:wrap; gap:6px; max-height:120px; overflow:auto; padding:2px; }
  .chip { padding:5px 12px; border:1.5px solid #cfe0bb; border-radius:20px; cursor:pointer; font-size:13px; background:#fff; user-select:none; }
  .chip.on { background:#7fb35a; color:#fff; border-color:#7fb35a; }

  .go { display:inline-flex; align-items:center; gap:8px; background:#7fb35a; color:#fff; border:none;
        border-radius:30px; padding:12px 28px; font-size:17px; font-weight:bold; cursor:pointer; margin-top:4px;
        box-shadow:0 3px 0 #5a8a3c; transition:transform .05s; }
  .go:active { transform:translateY(2px); box-shadow:0 1px 0 #5a8a3c; }
  .go:disabled { background:#bcd0a6; box-shadow:0 3px 0 #a5bd8f; cursor:default; }
  .ghost { background:#fff; color:#5a8a3c; border:1.5px solid #9cc473; box-shadow:none; padding:9px 18px; font-size:14px; }

  #msg { font-size:13px; margin:10px 0 0; min-height:20px; white-space:pre-line; }
  #msg.warn { color:#b9622a; background:#fff6ec; border:1px solid #f0d6b8; border-radius:10px; padding:10px 12px; }
  #msg.ok { color:#3f6b27; }

  .board-label { text-align:center; background:#33402c; color:#f3f7ec; border-radius:8px; padding:8px;
                 font-weight:bold; letter-spacing:4px; margin:4px 0 14px; }
  .grid { display:grid; gap:10px; }
  .seat { background:#fff; border:1.5px solid #d7e8c5; border-radius:12px; min-height:60px;
          display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:bold;
          color:#33402c; padding:6px; text-align:center; position:relative; }
  .seat.empty { background:#f0f3ec; color:#b9c4ac; font-weight:normal; border-style:dashed; }
  .seat.front { box-shadow: inset 0 -4px 0 #ffe08a; }
  .seat.clash { box-shadow: inset 0 0 0 2px #e88; }
  .seat .badge { position:absolute; top:3px; right:5px; font-size:10px; color:#c08a00; }
  .back-label { text-align:center; color:#8a9a7c; font-size:12px; margin-top:12px; }
  .flick { background:#eef6e4; }
  /* ステップUI */
  .step{ background:#fff; border:1.5px solid #dde7d0; border-radius:14px; padding:14px 18px; margin-bottom:14px; }
  .steptitle{ font-size:17px; font-weight:bold; color:#3f6b27; display:flex; align-items:center; margin-bottom:10px; }
  .stepnum{ display:inline-flex; width:28px; height:28px; background:#7fb35a; color:#fff; border-radius:50%;
            align-items:center; justify-content:center; font-weight:bold; margin-right:10px; flex:0 0 auto; }
  details.adv{ margin-bottom:14px; }
  details.adv>summary{ cursor:pointer; font-weight:bold; color:#5a8a3c; padding:11px 16px; background:#eef4e6;
                       border:1.5px dashed #9cc473; border-radius:12px; list-style:none; font-size:14px; }
  details.adv>summary::-webkit-details-marker{ display:none; }
  details.adv>summary::before{ content:"▶ "; font-size:11px; }
  details.adv[open]>summary::before{ content:"▼ "; }
  details.adv[open]>summary{ border-radius:12px 12px 0 0; }
  .advbody{ border:1.5px solid #dde7d0; border-top:none; border-radius:0 0 12px 12px; padding:14px 18px; background:#fff; }
  .ckbox{ display:inline-flex; align-items:center; gap:6px; margin:0 18px 0 0; font-weight:normal; color:#2f3b2a; font-size:14px; cursor:pointer; }
  .ckbox input{ width:16px; height:16px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🪑 席替えツール</h1>
  <div class="sub">名前を入れて、ボタンを押すだけ。たて（行）は人数に合わせて自動です。</div>

  <div class="step">
    <div class="steptitle"><span class="stepnum">1</span>クラスの名前を入れる</div>
    <textarea id="names" rows="7">あおい
はると
ゆい
そうた
めい
りく
さくら
かなで
ゆうき
ひなた
こはく
つむぎ
れん
あかり
だいち
みお
そら
いつき
ののか
ひかる
あさひ
まなと
ことね
ゆずき
たいが
すずな
かいと
みなみ
りつ
ねね</textarea>
    <div id="countInfo" style="margin-top:6px; font-size:14px; color:#3f6b27; font-weight:bold;"></div>
    <div class="hint" style="margin-top:2px;">※サンプルが入っています。自分のクラスに置きかえてね。</div>
  </div>

  <div class="step">
    <div class="steptitle"><span class="stepnum">2</span>よこ何人ならべる？</div>
    よこ <input type="number" id="cols" value="6" min="1" max="12"> 人ずつ
    <div id="layoutInfo" style="margin-top:8px; font-size:15px; font-weight:bold; color:#3f6b27;"></div>
  </div>

  <details class="adv">
    <summary>こだわり条件をつける（任意）　― 離したい子・前にしたい子 ―</summary>
    <div class="advbody">
      <label>離し方 <span class="hint">（チェックした位置を避けます。複数えらべます）</span></label>
      <div style="margin-bottom:14px;">
        <label class="ckbox"><input type="checkbox" id="avLR" checked> となり（左右）</label>
        <label class="ckbox"><input type="checkbox" id="avFB" checked> 前後</label>
        <label class="ckbox"><input type="checkbox" id="avDiag"> ななめ</label>
      </div>
      <label>離したいグループ <span class="hint">（同じグループの子を、上の位置にしません。1組まで4人）</span></label>
      <div id="groups"></div>
      <button class="addbtn" id="addGroup">＋ グループを追加</button>

      <label style="margin-top:16px;">前の方にしたい子 <span class="hint">（クリックで選択／視力・支援など）</span></label>
      <div class="chips" id="frontChips"></div>
    </div>
  </details>

  <div class="step" style="text-align:center;">
    <div class="steptitle" style="justify-content:center;"><span class="stepnum">3</span>シャッフル！</div>
    <button class="go" id="go">🎲 席替え！</button>
    <button class="go ghost" id="again">もう一回</button>
  </div>
  <div id="msg"></div>

  <div class="board-label">前（こくばん）</div>
  <div class="grid" id="grid"></div>
  <div class="back-label">うしろ</div>
</div>

<script>
const $ = id => document.getElementById(id);
const rosterNames = () => $("names").value.split("\n").map(s=>s.trim()).filter(Boolean);
const shuffle = a => { a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };

let frontSelected = new Set();

/* ---- 前列希望チップ ---- */
function buildFrontChips(){
  const names = rosterNames();
  frontSelected = new Set([...frontSelected].filter(n=>names.includes(n)));
  const box = $("frontChips"); box.innerHTML="";
  names.forEach(n=>{
    const c=document.createElement("div");
    c.className="chip"+(frontSelected.has(n)?" on":""); c.textContent=n;
    c.onclick=()=>{ if(frontSelected.has(n))frontSelected.delete(n); else frontSelected.add(n); c.classList.toggle("on"); };
    box.appendChild(c);
  });
}

/* ---- 離したいグループ（最大4人のselect×4） ---- */
function makeSelect(value){
  const s=document.createElement("select"); s.className="gsel";
  const names=rosterNames();
  const opt0=document.createElement("option"); opt0.value=""; opt0.textContent="（なし）"; s.appendChild(opt0);
  names.forEach(n=>{ const o=document.createElement("option"); o.value=n; o.textContent=n; s.appendChild(o); });
  if(value && names.includes(value)) s.value=value;
  return s;
}
function addGroup(preset){
  const g=document.createElement("div"); g.className="group";
  const lab=document.createElement("span"); lab.className="glabel"; lab.textContent="このグループは離す："; g.appendChild(lab);
  for(let i=0;i<4;i++) g.appendChild(makeSelect(preset && preset[i]));
  const rm=document.createElement("button"); rm.className="rm"; rm.textContent="削除"; rm.onclick=()=>g.remove();
  g.appendChild(rm);
  $("groups").appendChild(g);
}
function rebuildGroupOptions(){
  document.querySelectorAll("#groups .gsel").forEach(sel=>{
    const cur=sel.value; const names=rosterNames();
    sel.innerHTML="";
    const o0=document.createElement("option"); o0.value=""; o0.textContent="（なし）"; sel.appendChild(o0);
    names.forEach(n=>{ const o=document.createElement("option"); o.value=n; o.textContent=n; sel.appendChild(o); });
    sel.value = names.includes(cur) ? cur : "";
  });
}
function readGroups(){
  const groups=[];
  document.querySelectorAll("#groups .group").forEach(g=>{
    const members=[...new Set([...g.querySelectorAll(".gsel")].map(s=>s.value).filter(Boolean))];
    if(members.length>=2) groups.push(members);
  });
  return groups;
}

/* ---- 配置ロジック ---- */
function isClose(i,j,cols,m){
  const dr=Math.abs(Math.floor(i/cols)-Math.floor(j/cols));
  const dc=Math.abs((i%cols)-(j%cols));
  if(m.lr && dr===0 && dc===1) return true;   // 左右どなり
  if(m.fb && dc===0 && dr===1) return true;   // 前後
  if(m.diag && dr===1 && dc===1) return true; // ななめ
  return false;
}
// 余り席は「うしろ」から欠けさせる。半端な行は両端を空けて“中央寄せ”にする
function buildInactive(total,cols,rows,empties){
  const inactive=new Set();
  let remaining=empties, r=rows-1;
  while(remaining>=cols && r>=0){ for(let c=0;c<cols;c++) inactive.add(r*cols+c); remaining-=cols; r--; } // まるごと空く行
  if(remaining>0 && r>=0){ // 半端は両端に振り分け＝残る子が中央に
    const left=Math.ceil(remaining/2), right=remaining-left;
    for(let c=0;c<left;c++) inactive.add(r*cols+c);
    for(let c=0;c<right;c++) inactive.add(r*cols+(cols-1-c));
  }
  return inactive;
}
function generate(names,cols,rows,groups,frontSet,modes){
  const total=cols*rows;
  const empties=total-names.length;
  const inactive=buildInactive(total,cols,rows,empties);
  const activeSeats=[]; for(let i=0;i<total;i++) if(!inactive.has(i)) activeSeats.push(i);
  const frontList=names.filter(n=>frontSet.has(n));
  const others=names.filter(n=>!frontSet.has(n));
  const neededFrontRows=Math.max(1,Math.ceil(frontList.length/cols));
  const frontSeats=activeSeats.filter(i=>Math.floor(i/cols)<neededFrontRows);

  let best=null,bestV=Infinity;
  for(let attempt=0;attempt<1500;attempt++){
    const seats=new Array(total).fill(null);
    const fS=shuffle(frontSeats);
    frontList.forEach((n,k)=>{ if(k<fS.length) seats[fS[k]]=n; });
    const empty=activeSeats.filter(i=>seats[i]===null);
    const o=shuffle(others);
    shuffle(empty).slice(0,o.length).forEach((idx,k)=>seats[idx]=o[k]);
    const pos={}; seats.forEach((n,i)=>{ if(n) pos[n]=i; });
    let v=0;
    groups.forEach(g=>{ for(let i=0;i<g.length;i++)for(let j=i+1;j<g.length;j++){
      const a=g[i],b=g[j]; if(pos[a]!=null&&pos[b]!=null&&isClose(pos[a],pos[b],cols,modes)) v++; }});
    if(v<bestV){bestV=v;best=seats;}
    if(v===0)break;
  }
  const pos={}; best.forEach((n,i)=>{ if(n) pos[n]=i; });
  const violPairs=[];
  groups.forEach(g=>{ for(let i=0;i<g.length;i++)for(let j=i+1;j<g.length;j++){
    const a=g[i],b=g[j]; if(pos[a]!=null&&pos[b]!=null&&isClose(pos[a],pos[b],cols,modes)) violPairs.push([a,b]); }});
  const frontSpill=frontList.filter(n=>Math.floor(pos[n]/cols)!==0);
  const clashNames=new Set(violPairs.flat());
  return {seats:best, violPairs, frontSpill, clashNames, inactive};
}

function render(seats,cols,frontSet,flicker,clashNames,inactive){
  const grid=$("grid"); grid.style.gridTemplateColumns=`repeat(${cols},1fr)`; grid.innerHTML="";
  seats.forEach((n,i)=>{
    const isOff = inactive && inactive.has(i);
    const d=document.createElement("div");
    d.className="seat"+((n&&!isOff)?"":" empty")+(n&&frontSet.has(n)?" front":"")+(flicker?" flick":"")+((!flicker&&n&&clashNames&&clashNames.has(n))?" clash":"");
    if(isOff){ d.style.visibility="hidden"; }       // 席そのものが無い（うしろの欠け）→ 非表示
    else { d.textContent=n||"あき"; if(n&&frontSet.has(n)){ const b=document.createElement("span"); b.className="badge"; b.textContent="前"; d.appendChild(b); } }
    grid.appendChild(d);
  });
}

function run(){
  const names=rosterNames();
  const cols=Math.max(1,parseInt($("cols").value)||1);
  const groups=readGroups();
  const msg=$("msg");

  if(names.length===0){ msg.className="warn"; msg.textContent="名簿に名前を入れてね。"; return; }

  const rows=Math.max(1, Math.ceil(names.length/cols)); // たては人数から自動
  const total=cols*rows;

  const modes={ lr:$("avLR").checked, fb:$("avFB").checked, diag:$("avDiag").checked };
  const {seats,violPairs,frontSpill,clashNames,inactive}=generate(names,cols,rows,groups,frontSelected,modes);

  $("go").disabled=true; $("again").disabled=true; msg.className=""; msg.textContent="シャッフル中…";
  let ticks=0; const pool=names.slice();
  const activeIdx=[]; for(let i=0;i<total;i++) if(!inactive.has(i)) activeIdx.push(i);
  const timer=setInterval(()=>{
    const fake=new Array(total).fill(null);
    shuffle(pool).forEach((n,k)=>{ if(k<activeIdx.length) fake[activeIdx[k]]=n; });
    render(fake,cols,frontSelected,true,null,inactive);
    if(++ticks>=12){
      clearInterval(timer);
      render(seats,cols,frontSelected,false,clashNames,inactive);
      $("go").disabled=false; $("again").disabled=false;
      if(violPairs.length===0 && frontSpill.length===0){
        msg.className="ok"; msg.textContent="席替え完了！ 条件もぜんぶクリア🌱";
      } else {
        const parts=["席替えはできました。ただ、ぜんぶの条件は満たしきれませんでした👇"];
        if(violPairs.length){
          parts.push("◆ となりを離しきれなかったペア（赤ワク）：\n"+violPairs.map(p=>`　・${p[0]} と ${p[1]}`).join("\n"));
        }
        if(frontSpill.length){
          parts.push("◆ 前列きぼうが多くて、2列目になった子：\n"+frontSpill.map(n=>`　・${n}`).join("\n"));
        }
        parts.push("人数が席数に近い／条件が多いと起きやすいです。たて・よこを増やすか、条件を1つ減らすと収まりやすくなります。");
        msg.className="warn"; msg.textContent=parts.join("\n\n");
      }
    }
  },90);
}

/* ---- 初期化 ---- */
function updateLayoutInfo(){
  const N=rosterNames().length;
  const cols=Math.max(1,parseInt($("cols").value)||1);
  const rows=Math.max(1,Math.ceil(N/cols));
  const ci=$("countInfo"); if(ci) ci.textContent = N ? `→ いま ${N}人` : "";
  $("layoutInfo").textContent = N ? `→ よこ${cols}人 × たて${rows}行（自動）でならびます` : "↑ まず名前を入れてね";
}
$("names").addEventListener("input", ()=>{ buildFrontChips(); rebuildGroupOptions(); updateLayoutInfo(); });
$("cols").addEventListener("input", updateLayoutInfo);
$("addGroup").onclick=()=>addGroup();
$("go").onclick=run; $("again").onclick=run;

buildFrontChips();
addGroup(["れん","かいと"]);   // サンプル
frontSelected.add("みお"); buildFrontChips();
updateLayoutInfo();
render(new Array(30).fill(null),6,new Set(),false,null);
window.onload=run;
</script>
</body>
</html>
